version: '3'
services:
  wsgi:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data/backend/static/:/app/data/backend/static/
      - ./data/backend/logs/:/app/data/backend/logs/
    env_file:
      - .env
    environment:
      - LOG_FILE_NAME=wsgi
    command: ./entrypoint.sh
    restart: unless-stopped

  redis:
    image: "redis:alpine"
    ports:
      - "6379"
    restart: on-failure
    volumes:
      - redis_data:/data

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: celery -A cybernexvpn.celery.app worker --loglevel=info
    depends_on:
      - redis
    restart: on-failure
    volumes:
      - ./data/backend/static/:/app/data/backend/static/

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: celery -A cybernexvpn.celery.app beat --loglevel=info
    depends_on:
      - redis
    restart: on-failure
    volumes:
      - ./data/backend/static/:/app/data/backend/static/

  postgres:
    image: postgres:15
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT}:5432"
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

volumes:
  redis_data:
