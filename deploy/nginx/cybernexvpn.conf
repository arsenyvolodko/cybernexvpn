# /etc/nginx/sites-available/cybernexvpn.conf
#
# Host nginx (system service) — единственное, что слушает :80 / :443.
# Терминирует TLS и проксирует на локальные Docker-контейнеры:
#   /api/, /admin/  -> 127.0.0.1:8000  (Django / wsgi)
#   /static/        -> файлы на диске   (collectstatic)
#   /               -> 127.0.0.1:4200  (frontend SPA)
#
# Активация:
#   ln -s /etc/nginx/sites-available/cybernexvpn.conf /etc/nginx/sites-enabled/
#   rm -f /etc/nginx/sites-enabled/default
#   nginx -t && systemctl reload nginx

# ----- апстримы -----
upstream cybernexvpn_backend {
    server 127.0.0.1:8000;
}

upstream cybernexvpn_frontend {
    server 127.0.0.1:4200;
}

# ----- HTTP: ACME-челлендж + редирект на HTTPS -----
server {
    listen 80;
    listen [::]:80;
    server_name cybernexvpn.ru www.cybernexvpn.ru;

    # Let's Encrypt webroot (certbot certonly --webroot -w /var/www/certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ----- HTTPS -----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name cybernexvpn.ru www.cybernexvpn.ru;

    ssl_certificate     /etc/letsencrypt/live/cybernexvpn.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cybernexvpn.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Размер загружаемого тела (платёжные вебхуки / загрузки)
    client_max_body_size 20m;

    # Безопасные заголовки
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Логи
    access_log /var/log/nginx/cybernexvpn.access.log;
    error_log  /var/log/nginx/cybernexvpn.error.log;

    # ----- Django API -----
    location /api/ {
        proxy_pass http://cybernexvpn_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # ----- Django admin -----
    location /admin/ {
        proxy_pass http://cybernexvpn_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # ----- Статика Django (collectstatic) -----
    # STATIC_URL = "static/", файлы лежат в <repo>/data/backend/static/
    # Папка должна быть читаема www-data: chmod -R o+rX <repo>/data/backend/static/
    location /static/ {
        alias /srv/cybernexvpn/data/backend/static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ----- Frontend SPA -----
    location / {
        proxy_pass http://cybernexvpn_frontend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}